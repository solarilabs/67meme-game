<!DOCTYPE html>
<html>

<head>
<title>67 Clicker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
</head>

<body class="clicker-page">

<div class="topbar">

<button onclick="window.location.href='index.html'">🏠</button>

<h1>67 Clicker</h1>

<div id="shopButton" class="shopButton">
🛒 Shop
<span id="shopNotification" class="shopNotification">1</span>
</div>

</div>


<div class="game-area">

<div class="score">
67s: <span id="score">0</span>
</div>


<button id="clickButton" class="click67">
67
</button>

</div>


<div id="shopPanel" class="shopPanel">

<div class="shopHeader">
<h2>Shop</h2>
<button id="closeShop" class="closeShop">×</button>
</div>

<div class="upgradeItem">
<div class="upgradeInfo">
<div class="upgradeName">Cursor</div>
<div class="upgradeEffect">+1 per click</div>
</div>
<div class="upgradeCost">Cost: 10</div>
<button id="upgradeClick" class="upgradeBtn">Buy</button>
</div>

<div class="upgradeItem">
<div class="upgradeInfo">
<div class="upgradeName">Auto 67</div>
<div class="upgradeEffect">+1/sec</div>
</div>
<div class="upgradeCost">Cost: 50</div>
<button id="upgradeAuto" class="upgradeBtn">Buy</button>
</div>

<div class="upgradeItem">
<div class="upgradeInfo">
<div class="upgradeName">Factory</div>
<div class="upgradeEffect">+5/sec</div>
</div>
<div class="upgradeCost">Cost: 250</div>
<button id="upgradeFactory" class="upgradeBtn">Buy</button>
</div>

</div>


<div id="floatingNumbers"></div>

<script src="script.js"></script>

</body>

</html>
