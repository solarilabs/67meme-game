<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach 67</title>
    <meta name="google-site-verification" content="BwdQn2W_l_F30_Wt1yacZ3sPHWIMf3JdNEv5xWiF-8c" />
    <link rel="stylesheet" href="style.css">
    
</head>
<body class="reach">
    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen active">
        <div class="home-card">
            <h1 class="home-title">Reach 67</h1>
            <p class="home-subtitle">Stop the counter exactly at 67 to advance!</p>
            <button id="startGameBtn" class="btn btn-primary">Start Game</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div id="toolbar" class="toolbar">
            <div class="toolbar-info">
                <div>Level: <span id="levelDisplay">1</span></div>
                <div>Score: <span id="scoreDisplay">0</span></div>
            </div>
            <div class="toolbar-controls">
                <button id="homeBtn" class="icon-btn" title="Home">🏠</button>
                <button id="pauseBtn" class="icon-btn" title="Pause">⏸</button>
                <button id="restartBtn" class="icon-btn" title="Restart">🔄</button>
            </div>
        </div>
        <div class="game-content">
            <div class="game-info">
                <div>Level: <span id="levelDisplay">1</span></div>
                <div>Score: <span id="scoreDisplay">0</span></div>
            </div>
            <div id="numberDisplay" class="number-display">0</div>
            <button id="stopBtn" class="stop-btn">STOP</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="screen">
        <div class="result-card">
            <h2 id="resultTitle" class="result-title">Result</h2>
            <p id="resultMessage" class="result-message">Message</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
                <button id="homeBtnGameOver" class="btn btn-secondary">Home</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
